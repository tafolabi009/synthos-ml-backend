apiVersion: apps/v1
kind: Deployment
metadata:
  name: synthos-ml-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synthos-ml-backend
  template:
    metadata:
      labels:
        app: synthos-ml-backend
    spec:
      containers:
      - name: ml-backend
        image: us-central1-docker.pkg.dev/cs-poc-eeli19j6nx85aphvzv6bmeb/synthos/ml-backend:patched
        ports:
        - containerPort: 50051
          name: grpc-validation
        - containerPort: 50052
          name: grpc-collapse
        - containerPort: 50054
          name: grpc-data
        env:
        - name: ENVIRONMENT
          value: production
        - name: CLOUD_PROVIDER
          value: gcp
        - name: VALIDATION_SERVICE_PORT
          value: "50051"
        - name: COLLAPSE_SERVICE_PORT
          value: "50052"
        - name: DATA_SERVICE_PORT
          value: "50054"
        - name: SERVICE_HOST
          value: "0.0.0.0"
        - name: GCS_BUCKET
          value: synthos-datasets-cs-poc-eeli19j6nx85aphvzv6bmeb
        - name: LOG_LEVEL
          value: INFO
        resources:
          limits:
            cpu: "8"
            memory: "16Gi"
            nvidia.com/gpu: "1"
          requests:
            cpu: "4"
            memory: "8Gi"
            nvidia.com/gpu: "1"
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-t4
---
apiVersion: v1
kind: Service
metadata:
  name: synthos-ml-backend
  namespace: default
  annotations:
    networking.gke.io/load-balancer-type: "Internal"
spec:
  selector:
    app: synthos-ml-backend
  ports:
  - name: grpc-validation
    port: 50051
    targetPort: 50051
  - name: grpc-collapse
    port: 50052
    targetPort: 50052
  - name: grpc-data
    port: 50054
    targetPort: 50054
  type: LoadBalancer
