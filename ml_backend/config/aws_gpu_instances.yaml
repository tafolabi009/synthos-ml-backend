# ============================================================================
# Recommended Configurations by Use Case
# ============================================================================

recommendations:
  production_maximum_quality:
    instance: p4d.24xlarge
    reason: "Best balance of quality, speed, and cost for production"
    estimated_monthly_cost: "$14,300 reserved"
    validation_quality: "98%"
    validation_time: "4 hours"

  production_cost_optimized:
    instance: g5.12xlarge
    reason: "4x A10G provides good parallelism at lower cost"
    estimated_monthly_cost: "$2,500 reserved"
    validation_quality: "85%"
    validation_time: "25 hours"
    notes: "May need to run validations overnight"

  development:
    instance: g4dn.xlarge
    reason: "Minimum viable GPU for testing pipeline"
    estimated_monthly_cost: "$230 reserved"
    validation_quality: "70%"
    validation_time: "Sequential, ~60+ hours"
    notes: "Use skip_cascade_training=True for faster iteration"

  staging:
    instance: g5.xlarge
    reason: "Single A10G for pre-production testing"
    estimated_monthly_cost: "$440 reserved"
    validation_quality: "75%"
    validation_time: "~35 hours"


# ============================================================================
# Secrets Manager Configuration Template
# ============================================================================

secrets_manager_template:
  # Copy this to AWS Secrets Manager as JSON
  production:
    GPU_TIER: "auto"
    MAX_GPU_MEMORY_FRACTION: "0.9"
    ENABLE_MIXED_PRECISION: "true"
    FORCE_SEQUENTIAL_TRAINING: "false"
    COLLAPSE_THRESHOLD: "65.0"
    DIVERSITY_THRESHOLD: "50.0"

  development:
    GPU_TIER: "basic"
    MAX_GPU_MEMORY_FRACTION: "0.8"
    ENABLE_MIXED_PRECISION: "true"
    FORCE_SEQUENTIAL_TRAINING: "true"
    COLLAPSE_THRESHOLD: "60.0"
    DIVERSITY_THRESHOLD: "40.0"

  cost_optimized:
    GPU_TIER: "standard"
    MAX_GPU_MEMORY_FRACTION: "0.85"
    ENABLE_MIXED_PRECISION: "true"
    FORCE_SEQUENTIAL_TRAINING: "false"
    MAX_BATCH_SIZE: "64"
