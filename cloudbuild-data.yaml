steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/synthos/data-service:latest', '-f', 'data_service/Dockerfile', '.']
images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/synthos/data-service:latest'
options:
  machineType: 'E2_HIGHCPU_8'
timeout: '600s'
