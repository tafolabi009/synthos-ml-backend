steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/synthos/ml-backend:latest', '-f', 'ml_backend/Dockerfile.cloudrun', 'ml_backend/']
images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/synthos/ml-backend:latest'
options:
  machineType: 'E2_HIGHCPU_8'
timeout: '1800s'
